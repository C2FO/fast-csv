name: Test

on:
  push:
    branches: # Array of patterns that match refs/heads
      - main # Push events on main branch
  pull_request: # Specify a second event with pattern matching
env:
  CI: true

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 21.x, 22.x, 24.x]
    steps:
      # https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup pnpm
        # https://github.com/pnpm/action-setup/releases/tag/v6.0.8
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.33.4
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        # https://github.com/actions/setup-node/releases/tag/v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run jest
      - run: pnpm run examples
      - run: pnpm run benchmarks
      - name: Coveralls GitHub Action
        # Per Actions best practices, SHA is the safest for third party actions
        # https://github.com/coverallsapp/github-action/releases/tag/v2.3.7
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: run-unit-${{ matrix.node-version }}
          parallel: true

  finish:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        # Per Actions best practices, SHA is the safest for third party actions
        # https://github.com/coverallsapp/github-action/releases/tag/v2.3.7
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
